<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク編集</title>
</head>
<body>
    <div style="padding: 20px;">
        <h2>タスク編集</h2>
        <form th:action="@{/tasks/update/{id}(id=${task.id})}" method="post">
            <div style="margin-bottom: 15px;">
                <label>タイトル</label><br>
                <input type="text" name="title" th:value="${task.title}" style="width: 100%; padding: 5px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>内容</label><br>
                <textarea name="content" style="width: 100%; height: 80px; padding: 5px; box-sizing: border-box;" th:text="${task.content}"></textarea>
            </div>
            <div style="margin-bottom: 15px;">
                <label>登録者</label><br>
                <input type="text" name="name" th:value="${task.name}" style="width: 100%; padding: 5px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>開始日</label><br>
                <input type="date" name="startDate" th:value="${task.startDate}" style="width: 100%; padding: 5px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>終了日</label><br>
                <input type="date" name="endDate" th:value="${task.endDate}" style="width: 100%; padding: 5px; box-sizing: border-box;">
            </div>
            <button type="submit" style="background-color: #007bff; color: white; padding: 6px 16px; border: none; border-radius: 3px;">更新</button>
            <a th:href="@{/tasks}">
                <button type="button" style="background-color: #6c757d; color: white; padding: 6px 16px; border: none; border-radius: 3px;">←キャンセル</button>
            </a>
        </form>
    </div>
</body>
</html>
