<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク編集</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <div class="page-container">
        <h2>タスク編集</h2>
        <form th:action="@{/tasks/update/{id}(id=${taskId})}" th:object="${task}" method="post">
            <div class="form-group">
                <label for="title">タイトル</label><br>
                <input id="title" type="text" th:field="*{title}" class="form-control">
                <p th:errors="*{title}" class="field-error"></p>
            </div>
            <div class="form-group">
                <label for="content">内容</label><br>
                <textarea id="content" th:field="*{content}" class="form-control" style="height: 80px;"></textarea>
                <p th:errors="*{content}" class="field-error"></p>
            </div>
            <div class="form-group">
                <label for="name">登録者</label><br>
                <input id="name" type="text" th:field="*{name}" class="form-control">
                <p th:errors="*{name}" class="field-error"></p>
            </div>
            <div class="form-group">
                <label for="startDate">開始日</label><br>
                <input id="startDate" type="date" th:field="*{startDate}" class="form-control">
                <p th:errors="*{startDate}" class="field-error"></p>
            </div>
            <div class="form-group">
                <label for="endDate">終了日</label><br>
                <input id="endDate" type="date" th:field="*{endDate}" class="form-control">
                <p th:errors="*{endDate}" class="field-error"></p>
                <p th:errors="*{endDateAfterStartDate}" class="field-error"></p>
            </div>
            <button type="submit" class="btn btn-primary">更新</button>
            <a th:href="@{/tasks}">
                <button type="button" class="btn btn-secondary">←キャンセル</button>
            </a>
        </form>
    </div>
</body>
</html>
