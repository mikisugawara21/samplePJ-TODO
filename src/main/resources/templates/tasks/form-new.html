<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規タスク作成</title>
</head>
<body>
    <div style="padding: 20px;">
        <h2>新規タスク作成</h2>
        <form th:action="@{/tasks}" th:object="${task}" method="post">
            <div style="margin-bottom: 15px;">
                <label>タイトル</label><br>
                <input type="text" th:field="*{title}" style="width: 100%; padding: 5px; box-sizing: border-box;">
                <p th:errors="*{title}" style="color:red; font-size: 13px;"></p>
            </div>
            <div style="margin-bottom: 15px;">
                <label>内容</label><br>
                <textarea th:field="*{content}" style="width: 100%; height: 80px; padding: 5px; box-sizing: border-box;"></textarea>
                <p th:errors="*{content}" style="color:red; font-size: 13px;"></p>
            </div>
            <div style="margin-bottom: 15px;">
                <label>登録者</label><br>
                <input type="text" th:field="*{name}" style="width: 100%; padding: 5px; box-sizing: border-box;">
                <p th:errors="*{name}" style="color:red; font-size: 13px;"></p>
            </div>
            <div style="margin-bottom: 15px;">
                <label>開始日</label><br>
                <input type="date" th:field="*{startDate}" style="width: 100%; padding: 5px; box-sizing: border-box;">
                <p th:errors="*{startDate}" style="color:red; font-size: 13px;"></p>
            </div>
            <div style="margin-bottom: 15px;">
                <label>終了日</label><br>
                <input type="date" th:field="*{endDate}" style="width: 100%; padding: 5px; box-sizing: border-box;">
                <p th:errors="*{endDate}" style="color:red; font-size: 13px;"></p>
                <p th:errors="*{endDateAfterStartDate}" style="color:red; font-size: 13px;"></p>
            </div>
            <button type="submit" style="background-color: #007bff; color: white; padding: 6px 16px; border: none; border-radius: 3px;">保存</button>
            <a th:href="@{/tasks}">
                <button type="button" style="background-color: #6c757d; color: white; padding: 6px 16px; border: none; border-radius: 3px;">←キャンセル</button>
            </a>
        </form>
    </div>
</body>
</html>
