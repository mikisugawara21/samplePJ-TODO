<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <div class="page-container">
        <h2 class="text-center">タスク一覧</h2>

        <div class="text-right mb-10">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-secondary">ログアウト</button>
            </form>
        </div>

        <div th:if="${#lists.isEmpty(taskList)}" class="alert-info">
            📢 現在タスクは登録されていません。「新規作成」から追加してください。
        </div>

        <table th:if="${not #lists.isEmpty(taskList)}" class="table">
            <tr>
                <th>ID</th>
                <th>タイトル</th>
                <th>内容</th>
                <th>登録者</th>
                <th>開始日</th>
                <th>終了日</th>
                <th>作成日時</th>
                <th>更新日時</th>
                <th>操作</th>
            </tr>
            <tr th:each="task : ${taskList}">
                <td th:text="${task.id}"></td>
                <td th:text="${task.title}"></td>
                <td th:text="${task.content}"></td>
                <td th:text="${task.name}"></td>
                <td th:text="${task.startDate}"></td>
                <td th:text="${task.endDate}"></td>
                <td th:text="${task.createdAt}"></td>
                <td th:text="${task.updatedAt}"></td>
                <td>
                    <a th:href="@{/tasks/edit/{id}(id=${task.id})}">
                        <button class="btn btn-primary">編集</button>
                    </a>
                    <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger">削除</button>
                    </form>
                </td>
            </tr>
        </table>

        <div th:if="${not #lists.isEmpty(taskList)}" class="text-center mt-15">
            <a th:href="@{/tasks(page=${page - 1})}"
               th:classappend="${page == 1} ? 'disabled' : ''"
               class="page-link">« 前</a>
            <span th:each="i : ${#numbers.sequence(1, totalPages)}">
                <a th:href="@{/tasks(page=${i})}" th:text="${i}"
                   th:classappend="${i == page} ? 'active' : ''"
                   class="page-link"></a>
            </span>
            <a th:href="@{/tasks(page=${page + 1})}"
               th:classappend
