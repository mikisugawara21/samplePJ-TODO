<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th { background-color: #333; color: white; padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #ddd; }
		tr:last-child td { border-bottom: none; }
        .btn-edit { background-color: #007bff; color: white; padding: 3px 8px; border: none; border-radius: 3px; }
        .btn-delete { background-color: #dc3545; color: white; padding: 3px 8px; border: none; border-radius: 3px; }
		td a { text-decoration: none; }
    </style>
</head>
<body>
    <div style="padding: 20px;">
		<h2 style="text-align: center;">タスク一覧</h2>

		<div style="text-align: right; margin-bottom: 10px;">
		    <form th:action="@{/logout}" method="post" style="display:inline;">
		        <button type="submit" style="background-color: #6c757d; color: white; padding: 6px 12px; border: none; border-radius: 3px;">ログアウト</button>
		    </form>
		</div>

		<div th:if="${#lists.isEmpty(taskList)}"
		     style="background-color: #e0f0ff; padding: 12px; border-radius: 4px; margin-bottom: 10px; text-align: center;">
		    📢 現在タスクは登録されていません。「新規作成」から追加してください。
		</div>
		
		<table th:if="${not #lists.isEmpty(taskList)}">
            <tr>
                <th>ID</th>
                <th>タイトル</th>
                <th>内容</th>
                <th>登録者</th>
                <th>開始日</th>
                <th>終了日</th>
                <th>作成日時</th>
                <th>更新日時</th>
                <th>操作</th>
            </tr>
            <tr th:each="task : ${taskList}">
                <td th:text="${task.id}"></td>
                <td th:text="${task.title}"></td>
                <td th:text="${task.content}"></td>
                <td th:text="${task.name}"></td>
                <td th:text="${task.startDate}"></td>
                <td th:text="${task.endDate}"></td>
                <td th:text="${task.createdAt}"></td>
                <td th:text="${task.updatedAt}"></td>
                <td>
                    <a th:href="@{/tasks/edit/{id}(id=${task.id})}">
                        <button class="btn-edit">編集</button>
                    </a>
                    <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn-delete">削除</button>
                    </form>
                </td>
            </tr>
        </table>
		<div th:if="${not #lists.isEmpty(taskList)}" style="text-align: center; margin-top: 15px; font-size: 0;">
		    <a th:if="${page > 1}" th:href="@{/tasks(page=${page - 1})}" 
		       style="padding: 4px 10px; border: 1px solid #ccc; border-radius: 3px; text-decoration: none; color: #333; margin: 0; font-size: 14px;">« 前</a>
		    <span th:if="${page == 1}"
		       style="padding: 4px 10px; border: 1px solid #ccc; border-radius: 3px; color: #ccc; margin: 0; font-size: 14px;">« 前</span>
		    <span th:each="i : ${#numbers.sequence(1, totalPages)}">
		        <a th:href="@{/tasks(page=${i})}" th:text="${i}"
		           th:style="${i == page} ? 'padding: 4px 10px; border: 1px solid #007bff; border-radius: 3px; text-decoration: none; background-color: #007bff; color: white; margin: 0; font-size: 14px;'
		                                  : 'padding: 4px 10px; border: 1px solid #ccc; border-radius: 3px; text-decoration: none; color: #333; margin: 0; font-size: 14px;'">
		        </a>
		    </span>
		    <a th:if="${page < totalPages}" th:href="@{/tasks(page=${page + 1})}"
		       style="padding: 4px 10px; border: 1px solid #ccc; border-radius: 3px; text-decoration: none; color: #333; margin: 0; font-size: 14px;">次 >></a>
		    <span th:if="${page == totalPages}"
		       style="padding: 4px 10px; border: 1px solid #ccc; border-radius: 3px; color: #ccc; margin: 0; font-size: 14px;">次 >></span>
		</div>
		
		<div style="text-align: right; margin-top: 20px;">
		            <a th:href="@{/tasks/new}">
		                <button style="background-color: green; color: white; padding: 8px 16px; border: none; border-radius: 3px;">＋新規作成</button>
		            </a>
		</div>
    </div>
</body>
</html>
