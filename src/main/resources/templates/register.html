<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザ登録</title>
</head>
<body>
    <div style="text-align:center; margin-top: 30px;">
        <div style="display: inline-block; border: 1px solid #ccc; padding: 15px 25px; border-radius: 5px;">
            <h3 style="font-size: 18px;">ユーザ登録</h3>
            <form th:action="@{/register}" method="post">
                <div style="text-align: left;">
                    <label style="font-size: 13px;">ユーザ名（半角英字）</label><br>
                    <input type="text" name="username" style="width: 100%; padding: 3px; margin-top: 3px; box-sizing: border-box;">
                </div>
                <div style="text-align: left; margin-top: 10px;">
                    <label style="font-size: 13px;">パスワード（半角英数字）</label><br>
                    <input type="password" name="password" style="width: 100%; padding: 3px; margin-top: 3px; box-sizing: border-box;">
                </div>
                <div style="margin-top: 12px;">
                    <button type="submit" style="background-color: green; color: white; padding: 6px 0; border: none; border-radius: 3px; font-size: 13px; width: 100%;">登録</button>
                </div>
            </form>
            <div style="margin-top: 10px;">
                <a th:href="@{/login}" style="font-size: 13px; color: #007bff;">ログインはこちら</a>
            </div>
        </div>
    </div>
</body>
</html>
