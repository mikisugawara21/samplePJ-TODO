<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザ登録</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <div class="text-center mt-20">
        <h3>ユーザ登録</h3>
        <div class="card">
            <form th:action="@{/register}" th:object="${registerForm}" method="post">
                <div class="form-group" style="text-align: left;">
                    <label for="username">ユーザ名（3〜20文字、半角英数字とアンダースコア）</label><br>
                    <input id="username" type="text" th:field="*{username}" class="form-control">
                    <p th:errors="*{username}" class="field-error"></p>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label for="password">パスワード（8文字以上）</label><br>
                    <input id="password" type="password" th:field="*{password}" class="form-control">
                    <p th:errors="*{password}" class="field-error"></p>
                </div>
                <div class="mt-15">
                    <button type="submit" class="btn btn-success">登録</button>
                </div>
            </form>
            <div class="mt-15">
                <a th:href="@{/login}">ログインはこちら</a>
            </div>
        </div>
    </div>
</body>
</html>
