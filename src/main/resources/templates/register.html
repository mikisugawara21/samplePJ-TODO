<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザ登録</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <div style="text-align:center; margin-top: 30px;">
        <div style="display: inline-block; border: 1px solid #ccc; padding: 15px 25px; border-radius: 5px;">
            <h3 style="font-size: 18px;">ユーザ登録</h3>
            <form th:action="@{/register}" method="post">
                <div class="form-group" style="text-align: left;">
                    <label for="username" style="font-size: 13px;">ユーザ名（半角英字）</label><br>
                    <input id="username" type="text" name="username" class="form-control" style="padding: 3px; margin-top: 3px;">
                </div>
                <div class="form-group" style="text-align: left;">
                    <label for="password" style="font-size: 13px;">パスワード（半角英数字）</label><br>
                    <input id="password" type="password" name="password" class="form-control" style="padding: 3px; margin-top: 3px;">
                </div>
                <div style="margin-top: 12px;">
                    <button type="submit" class="btn btn-success" style="width: 100%; font-size: 13px;">登録</button>
                </div>
            </form>
            <div style="margin-top: 10px;">
                <a th:href="@{/login}" style="font-size: 13px; color: #007bff;">ログインはこちら</a>
            </div>
        </div>
    </div>
</body>
</html>
